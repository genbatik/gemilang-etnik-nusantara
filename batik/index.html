<!DOCTYPE html>
<html>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
}

/* Banner */
header{
    width:100%;
    height:100vh;
    overflow:hidden;
    position:relative;
}

header img{
    width:100%;
    height:100%;
    object-fit:cover;
    display:block;
}

.w3-display-middle{
    width:100%;
    text-align:center;
    padding:0 20px;
}

.w3-display-middle h1{
    font-size:48px;
    font-weight:bold;
}

@media(max-width:768px){

    header{
        height:60vh;
    }

    .w3-display-middle h1{
        font-size:28px;
    }

}
</style>
